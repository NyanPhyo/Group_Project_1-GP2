<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Hiring website of cybersecurity company">
    <meta name="keywords" content="assignment 1">
    <meta name="author" content="NPA, WPH, AKZ, HATH">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
</head>
<body>
    <!--nav contain logo, company name and navgation bar-->
    <nav>
        <div class="logo">
            <img src="./resources/images/cyber-security-logo-design_23-2151863644.png" alt="page logo" title="page logo">
            <span class="title">3A1W</span>
        </div>
        
        
        <div class="menu">
            <input type="radio" name="menu-check" id="home">
            <input type="radio" name="menu-check" id="jobs">
            <input type="radio" name="menu-check" id="apply" checked>
            <input type="radio" name="menu-check" id="about">

            <div class="buttons">
                <label for="home"><a href="./index.html"><i class="fa-solid fa-home"></i>Home</a></label>
                <label for="jobs"><a href="./jobs.html"><i class="fa-solid fa-briefcase"></i>Jobs</a></label>
                <label for="apply"><a href="./apply.html"><i class="fa-solid fa-file-signature"></i>Apply</a></label>
                <label for="about"><a href="./about.html"><i class="fa-solid fa-circle-info"></i>About</a></label>
            </div>
        </div> 
    </nav>
        
     
    <!--main contain main contents of the web page-->
    <main>
        <h1>This is apply page</h1>
        <h2>Job Application  Form</h2>
        <form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post">
            <p>
                <label for="ref">Job Refrence Number</label><br>
                <input type="text" name="ref" id="ref" required pattern="[A-Za-z0-9]{5}" placeholder="A1B2C">
            </p>
            <fieldset>
                <legend>Personal Information</legend>
                 <p>   
                    <label for="fname" >First Name</label><br>
                    <input type="text" id="fname" name="fname" required pattern="[A-Za-z][1,20]" placeholder="Henry">
                </p>
                <p>
                    <label for="lname">Last Name</label><br>
                    <input type="text" id="lname" name="lname" required pattern="[A-Za-z][1,20]" placeholder="Htoo">
                </p>
         
               
                <p>
                    <label for="bday">Date of Birth</label><br>
                    <input type="date" id="bday" name="bday" required placeholder="dd/mm/yyyy">
                </p>
                
               <fieldset>
                <legend>Gender</legend>
                     <p>
                    <strong>Gender</strong>
                   </p>
                   <label><input type="radio" name="gender" value="male" required> Male</label><br>
                   <label><input type="radio" name="gender" value="female"> Female</label><br>
                   <label><input type="radio" name="gender" value="other"> Other</label>

                
               </fieldset>
            </fieldset>
            <fieldset>
                <legend>Adress</legend>
                <p>
                    <label for="street">Street Adress</label><br>
                    <input type="text" name="street" id="street" maxlength="40">
                  
                </p>
                 <p>
                    <label for="town">Subrub/Town</label><br>
                    <input type="text" name="town" id="town" maxlength="40">
                  
                </p>
                    <label for="state">State:</label><br>
                    <select id="state" name="state" required>
                    <option value="">Select</option>
                    <option value="VIC">VIC</option>
                    <option value="NSW">NSW</option>
                    <option value="QLD">QLD</option>
                    <option value="NT">NT</option>
                    <option value="WA">WA</option>
                    <option value="SA">SA</option>
                    <option value="TAS">TAS</option>
                    <option value="ACT">ACT</option>
                    </select>
                </p>
                 <p>
                    <label for="post">Postal Code</label><br>
                    <input type="text" name="post" id="post" required pattern="[0-9]{4}">
                  
                </p>
                <p>
                
            </fieldset>
            <legend>Contact Details</legend>
                   <p>
                    <label for="email">Email Adress:  </label><br>
                    <input type="email" name="email" id="email" >
                </p>
                <p>
                     <label for="phone">Phone Number:</label><br>
                     <input type="text" name="phone" id="phone" required pattern="[0,9]{9,11}" placeholder="01xxxxxxxxxx"> 
                </p>
            <fieldset>
                <legend>Techinical Skills</legend>
                <p>Select Your Revelent Skills</p>
                <label><input type="checkbox" name="skills[]"  value="networking">Networking</label><br>
                <label><input type="checkbox" name="skills[]" value="cybersecurity">Cybersecurity</label><br>
                <label><input type="checkbox" name="skills[]" value="python">Python</label><br>
                <label><input type="checkbox" name="skills[]" value="pen_testing">Pentration Testing</label><br>
                <label><input type="checkbox" name="skills[]" value="devops">DevOps</label><br>
                <label><input type="checkbox" name="skills[]" value="cluod">Cloud</label><br>
                <p>
                    <label for=""><input type="checkbox" id="otherskills" name="skills[]" value="others">Other Skills..</label>

                </p>
                <label for="otherskills">Please Specify</label><br>
                 <textarea name="otherskills" id="otherskills" rows="4" placeholder="Pleas enter additional skills"></textarea>
            </fieldset>
            <p>
                <button>Summit Application</button>
            </p>


        </form>
    </main>

    <!--footer contain social contact and -->
    <footer>

    </footer>
</body>
</html>
